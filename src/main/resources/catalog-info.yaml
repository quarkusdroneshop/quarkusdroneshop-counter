---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-asite-web-updates
  description: "Kafka トピック: web-updates（注文ステータス更新）"
  annotations:
    backstage.io/kubernetes-cluster: a-cluster
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: a-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: web-updates
      version: 1.0.0
      description: カウンターからWebへの注文ステータス更新トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      web-updates:
        description: 注文ステータス更新をWebに送信するトピック
        publish:
          operationId: sendWebUpdate
          message:
            name: DashboardUpdate
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                status:
                  type: string
                item:
                  type: string
