apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quarkusdroneshop-counter
  description: カウンター業務のマイクロサービスです
  tags:
    - latest
    - a-cluster
  labels:
    app: counter
  annotations:
    github.com/project-slug: quarkusdroneshop/quarkusdroneshop-counter
    backstage.io/kubernetes-id: quarkusdroneshop-counter
    backstage.io/kubernetes-cluster: a-cluster
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=quarkusdroneshop-counter
    argocd/app-selector: app.kubernetes.io/instance=quarkusdroneshop-counter
    tekton.dev/type: pipeline
    rhdh.redhat.com/tekton-enabled: "true"
    tektonci.io/pipeline: build-and-push-quarkusdroneshop-counter
    tektonci.io/pipelineNamespace: quarkusdroneshop-cicd
    tekton.dev/cicd: "true"
    janus-idp.io/tekton: "true"
    backstage.io/techdocs-ref: url:https://github.com/quarkusdroneshop/quarkusdroneshop-counter/tree/main/
spec:
  type: microservice
  owner: user:default/nmushino
  lifecycle: production
  system: a-cluster
  dependsOn:
    - component:quarkusdroneshop-qdca10
    - component:quarkusdroneshop-qdca10pro
    - component:quarkusdroneshop-inventory
    - resource:droneshopdb-postgresql
    - resource:shop-cluster-kafka
    - resource:shop-orders-in
    - resource:shop-bsite-orders-up
  consumesApis:
    - kafka-asite-orders-in
    - kafka-bsite-orders-up
  providesApis:
    - kafka-asite-qdca10-in
    - kafka-asite-qdca10pro-in
    - kafka-asite-web-updates
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-asite-qdca10-in
  description: "Kafka トピック: qdca10-in（QDCA10への注文指示）"
  annotations:
    backstage.io/kubernetes-cluster: a-cluster
    openmetadata/explore-url: "http://openmetadata-openmetadata.apps.ocp.hfczn.sandbox2320.opentlc.com/topic/external-shop-cluster-kafka-asite%3A9094.qdca10-in/schema"
  links:
    - url: "http://openmetadata-openmetadata.apps.ocp.hfczn.sandbox2320.opentlc.com/topic/external-shop-cluster-kafka-asite%3A9094.qdca10-in/schema"
      title: データカタログ
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: a-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: qdca10-in
      version: 1.0.0
      description: カウンターからQDCA10への注文チケット送信トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      qdca10-in:
        description: QDCA10への注文チケットを送信するトピック
        publish:
          operationId: sendQdca10Order
          message:
            name: OrderTicket
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                item:
                  type: string
                preparedBy:
                  type: string
---
