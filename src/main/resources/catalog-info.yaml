  annotations:
    backstage.io/kubernetes-cluster: a-cluster
    openmetadata/explore-url: "http://openmetadata-openmetadata.apps.ocp.hfczn.sandbox2320.opentlc.com/topic/external-shop-cluster-kafka-asite%3A9094.qdca10pro-in/schema"
  links:
    - url: "http://openmetadata-openmetadata.apps.ocp.hfczn.sandbox2320.opentlc.com/topic/external-shop-cluster-kafka-asite%3A9094.qdca10pro-in/schema"
      title: データカタログ
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: a-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: qdca10pro-in
      version: 1.0.0
      description: カウンターからQDCA10Proへの注文チケット送信トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      qdca10pro-in:
        description: QDCA10Proへの注文チケットを送信するトピック
        publish:
          operationId: sendQdca10proOrder
          message:
            name: OrderTicket
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
