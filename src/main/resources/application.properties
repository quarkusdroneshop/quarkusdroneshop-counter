#Kafka
# Configure the SmallRye Kafka connector
auto.create.topics.enable=true
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
%dev.kafka.bootstrap.servers=localhost:9092
%test.kafka.bootstrap.servers=localhost:9092
%test.quarkus.kafka.health.enabled=false


## マイクロサービスをまたぐ連携は dataproduct 経由に統一する方針のため、
## QDCA10/QDCA10pro の直接トピック (orders-up) ではなく、order-events Flink
## ジョブが発行する dataproduct-order-events (Avro) を購読する。
## order-events は asite でのみ稼働しており counter も asite なので、
## サイトprefixは不要 (order-events を他サイトに展開する場合は要見直し)。
#＃ dataproduct-order-events
## QDCA10 / QDCA10Pro への新規注文通知は直接トピック (qdca10-in/qdca10pro-in) ではなく
## dataproduct-order-events 経由に統一されている。orders-in に publish した時点で
## order-events Flink ジョブが自動的に ORDER_PLACED として再発行し、QDCA10/QDCA10pro は
## それを購読する (この counter サービス自身の orders-in 送信元も web と共通)。
## そのため qdca10-in/qdca10pro-in への直接発行は不要 (本番では購読者もいなかった)。
mp.messaging.incoming.orders-up.connector=smallrye-kafka
mp.messaging.incoming.orders-up.topic=dataproduct-order-events
mp.messaging.incoming.orders-up.value.deserializer=io.quarkusdroneshop.infrastructure.OrderEventTicketUpDeserializer
mp.messaging.incoming.orders-up.apicurio.registry.url=${APICURIO_REGISTRY_URL}/apis/registry/v2

## Orders
### orders-in topic receives messages from the web or other order sources
### orders-in は本サービスがオーナであり、一次発生源（ソース）を、その正当な所有者・最初の消費者が直接読むのは正統的な考えである
### そのためここはデータプロダクト化せず。
mp.messaging.incoming.orders-in.connector=smallrye-kafka
mp.messaging.incoming.orders-in.topic=orders-in
mp.messaging.incoming.orders-in.value.deserializer=io.quarkusdroneshop.infrastructure.PlaceOrderCommandDeserializer

## Web
### 実質Counterのフロントサービスのため、ここもデータプロダクトにせず、直接購読する形に統一する。
mp.messaging.outgoing.web-updates.connector=smallrye-kafka
mp.messaging.outgoing.web-updates.topic=web-updates
mp.messaging.outgoing.web-updates.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.web-updates.merge=true

# Homeoffice (Real-Time Order Board) は dataproduct-order-events を直接購読する形に
# 統一されたため、counter からの直接発行 (shop-asite.orders-in) は不要になった。

# Health Check
quarkus.smallrye-health.ui.always-include=true
quarkus.kafka.health.enabled=true
